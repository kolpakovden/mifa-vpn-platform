services:
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: mifa-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
      - ./prometheus/alerts-mifa.yml:/etc/prometheus/alerts-mifa.yml:ro
    ports:
      - "9090:9090"

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: mifa-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'

  loki:
    image: grafana/loki:2.9.10
    container_name: mifa-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/var/lib/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:2.9.10
    container_name: mifa-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/log:/var/log:ro
      - promtail_positions:/var/lib/loki
      - /var/log/mifa:/var/log/mifa:ro

  mifa-alert-router:
    build: ./alert-router
    container_name: mifa-alert-router
    restart: unless-stopped
    env_file:
      - ./alert-router/alert-router.env
    command: ["gunicorn","-b","0.0.0.0:8080","app:app","--workers","1","--threads","4","--timeout","30","--access-logfile","-","--error-logfile","-"]
    ports:
      - "8080:8080"
 
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: mifa-alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"

  grafana:
    image: grafana/grafana:10.4.8
    container_name: mifa-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
  promtail_positions:
